spring:
  application:
    name: high-concurrency-ledger

  # --- Java 21 Virtual Threads ---
  # This single flag switches Tomcat's request-handling executor to
  # Executors.newVirtualThreadPerTaskExecutor(). Every incoming HTTP request
  # (and, by extension, every @Transactional service call it triggers) runs
  # on a cheap virtual thread instead of a pooled platform thread.
  # This matters a LOT for this ledger: pessimistic DB locks (see AccountRepository)
  # cause threads to block while waiting for a row lock to release. Blocking a
  # platform thread wastes an OS thread; blocking a virtual thread is nearly free,
  # so the app can hold thousands of in-flight, lock-waiting transfer requests
  # without exhausting a fixed-size thread pool.
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5432/ledger_db
    username: postgres
    password: Sudh@2005
    driver-class-name: org.postgresql.Driver
    hikari:
      # Kept deliberately small. Virtual threads remove the need for a huge
      # platform thread pool, but the JDBC connection pool is still bounded
      # by real DB connections/locks, not by thread count.
      maximum-pool-size: 20
      minimum-idle: 5
      # Fail fast rather than queue indefinitely behind a pessimistic lock.
      connection-timeout: 5000

  jpa:
    hibernate:
      # Never use 'update'/'create' in production. Schema is owned by Flyway.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          # PESSIMISTIC_WRITE lock acquisition should not hang forever.
          # Fail fast (ms) instead of stacking up blocked virtual threads
          # indefinitely on a deadlocked or long-held row lock.
          lock:
            timeout: 3000
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: warn
    com.ledger: info

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

ledger:
  jwt:
    secret: 8a79822e300de21714fa751d291bf9ba8eab0c20a7ce066033a39e4c3462ce3c
    # Short-lived on purpose: a stolen access token is only useful for
    # 15 minutes. Session longevity comes from the refresh token instead.
    expiration-ms: 900000          # 15 minutes
    refresh-expiration-ms: 604800000 # 7 days
  cors:
    # Comma-separated list of origins allowed to call this API from a browser.
    # 5173 is Vite's default dev port; 4173 is `vite preview`'s default.
    allowed-origins: ${LEDGER_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173}
