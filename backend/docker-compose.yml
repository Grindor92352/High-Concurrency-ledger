services:
  postgres:
    image: postgres:16-alpine
    container_name: ledger-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ledger_db
      POSTGRES_USER: ${DB_USERNAME:-ledger_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - ledger_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-ledger_user} -d ledger_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ledger_pgdata:
